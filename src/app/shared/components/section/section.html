<main class="max-w-7xl mx-auto px-6 py-12">
  <div class="flex items-center gap-4 mb-10">
    <div class="h-10 w-1.5 bg-blue-600 rounded-full"></div>
    <h1 class="text-3xl font-bold text-slate-900 capitalize italic">
      {{ activeCategory() }}
    </h1>
  </div>

  @if (isLoading()) {
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
       <p>Loading berita...</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (item of newsList(); track item.link) {
        <app-news-card [article]="item"></app-news-card>
      } @empty {
        <div class="col-span-full text-center py-20">
          <p class="text-slate-400">Tidak ada berita ditemukan.</p>
        </div>
      }
    </div>
  }
</main>
